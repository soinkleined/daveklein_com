<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Styleguide</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        body { padding: 20px; }
        .color-box { width: 100px; height: 100px; display: inline-block; margin: 10px; }
    </style>
</head>
<body>
    <h1>Typography</h1>
    <h1>Heading 1</h1>
    <h2>Heading 2</h2>
    <h3>Heading 3</h3>
    <p>Body text example.</p>

    <h1>Colors</h1>
    <div class="color-box bg-primary"></div><span>Primary</span>
    <div class="color-box bg-dark"></div><span>Dark</span>

    <h1>Buttons</h1>
    <button class="btn btn-primary">Primary Button</button>
    <button class="btn btn-outline-primary">Outline Primary Button</button>
    <button class="btn btn-outline-dark">Outline Dark Button</button>

    <h1>Badges</h1>
    <span class="badge bg-primary">Primary Badge</span>
    <span class="badge bg-secondary">Secondary Badge</span>
</body>
</html>
