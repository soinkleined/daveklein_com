<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Styleguide</title>
    <!-- Bootstrap 5 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.2/css/all.min.css">
    <!-- Custom CSS (relative path) -->
    <link rel="stylesheet" href="../../css/main.css">
    <style>
        body { padding: 40px; }
        .example-section { margin-bottom: 40px; padding: 20px; border: 1px solid #ddd; }
        .color-box { width: 100px; height: 100px; display: inline-block; margin: 10px; border: 1px solid #000; }
    </style>
</head>
<body>
    <h1>Site Styleguide</h1>
    
    <div class="example-section">
        <h2>Typography</h2>
        <h1>Heading 1</h1>
        <h2>Heading 2</h2>
        <h3>Heading 3</h3>
        <p>Body text example with <a href="#">a link</a>.</p>
    </div>

    <div class="example-section">
        <h2>Colors</h2>
        <div class="color-box bg-primary"></div><span>Primary ($theme-primary)</span>
        <div class="color-box bg-dark"></div><span>Dark ($theme-dark)</span>
    </div>

    <div class="example-section">
        <h2>Buttons</h2>
        <button class="btn btn-primary">Primary Button</button>
        <button class="btn btn-outline-primary filter-btn active">Outline Primary (Active)</button>
        <button class="btn btn-outline-dark">Outline Dark Button</button>
    </div>

    <div class="example-section">
        <h2>Badges</h2>
        <span class="badge bg-primary">Primary Badge</span>
        <span class="badge bg-secondary">Secondary Badge</span>
    </div>
</body>
</html>
