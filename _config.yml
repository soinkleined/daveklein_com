# Site settings — replace all dummy values before deploying
title:          "daveklein.com"
description:    "A personal website."
baseurl:        "/creative-theme-jekyll"        # subpath of your site, e.g. /blog
url:            "https://soinkleined.github.io"
author:         "David Klein"
email:          "info@daveklein.com"

# Social — leave blank to hide the link
twitter_username: 
github_username:  

# Build settings
markdown:    kramdown
highlighter: rouge
permalink:   pretty

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Sass
sass:
  style: compressed

# Exclude from build output
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - LICENCE
  - vendor

# Sensible defaults
future:      false
show_drafts: false
