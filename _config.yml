# Site settings — replace all dummy values before deploying
title:          "My Website"
description:    "A personal website."
baseurl:        ""        # subpath of your site, e.g. /blog
url:            "https://example.com"
author:         "Your Name"
email:          "you@example.com"

# Social — leave blank to hide the link
twitter_username: yourhandle
github_username:  yourhandle

# Build settings
markdown:    kramdown
highlighter: rouge
permalink:   pretty

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Sass
sass:
  style: compressed

# Exclude from build output
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - LICENCE
  - vendor

# Sensible defaults
future:      false
show_drafts: false
