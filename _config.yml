# Site settings — replace all dummy values before deploying
title:          "daveklein.com"
description:    "A personal website."
baseurl:        "/daveklein_com"        # subpath of your site, e.g. /blog
url:            "https://soinkleined.github.io"
author:         "David Klein"
email:          "info@daveklein.com"

# Social links are now managed in _data/social.yml

# Build settings
markdown:    kramdown
highlighter: rouge
permalink:   pretty

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-archives

# Sass
sass:
  style: compressed

# Jekyll Archives Configuration
jekyll-archives:
  enabled:
    - categories
  layout: 'page'
  permalinks:
    category: '/categories/:name/'

# Exclude from build output
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - LICENCE
  - vendor
  - docs

# Sensible defaults
future:      true
show_drafts: false
