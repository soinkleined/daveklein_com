<!DOCTYPE html>
<html lang="en">

{% include head.html %}

<body id="page-top">
  {% include nav.html %}

  <header class="header-subpage bg-dark pt-3 pb-2">
  </header>

  <section class="py-4">
    <div class="container px-4 px-lg-5">
      <div class="row gx-4 gx-lg-5 justify-content-center">
        <div class="col-lg-8">
          {% if page.image %}
            <img src="{{ page.image | relative_url }}" class="img-fluid mb-4" alt="{{ page.title }}">
          {% endif %}
          <h1 class="mb-4">{{ page.title }}</h1>
          {{ content }}
        </div>
      </div>
    </div>
  </section>

  {% include footer.html %}
  {% include scripts.html %}
</body>

</html>
