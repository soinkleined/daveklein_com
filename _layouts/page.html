<!DOCTYPE html>
<html lang="en">

{% include head.html %}

<body id="page-top">
  {% include nav.html %}

  <header class="bg-dark pt-5 pb-4">
    <div class="container px-4 px-lg-5 mt-5 mb-2">
      <div class="text-center text-white">
        <h1 class="display-4 fw-bolder">{{ page.title }}</h1>
        {% if page.description %}
        <p class="lead fw-normal text-white-50 mb-0">{{ page.description }}</p>
        {% endif %}
      </div>
    </div>
  </header>

  <section class="py-5">
    <div class="container px-4 px-lg-5">
      <div class="row gx-4 gx-lg-5 justify-content-center">
        <div class="col-lg-8">
          <div class="d-flex justify-content-end mb-4 no-print">
            <button onclick="window.print()" class="btn btn-outline-dark btn-sm">
              <i class="fa-solid fa-print me-2"></i>Print CV
            </button>
          </div>
          {{ content }}
        </div>
      </div>
    </div>
  </section>

  {% include contact.html %}
  {% include scripts.html %}
</body>

</html>
