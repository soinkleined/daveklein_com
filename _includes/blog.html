<section id="blog">
    <div class="container">
        <div class="row">
            <div class="col-lg-12 text-center">
                <h2 class="section-heading">Latest Blog Posts</h2>
                <hr class="primary">
            </div>
        </div>
        <div class="row justify-content-center">
            <div class="col-lg-8">
                {% for post in site.posts %}
                <div class="mb-5">
                    <h3><a href="{{ post.url | relative_url }}">{{ post.title }}</a></h3>
                    <p class="text-muted">{{ post.date | date: "%B %d, %Y" }}</p>
                    <p>{{ post.description | default: post.excerpt | strip_html | truncate: 160 }}</p>
                    <a href="{{ post.url | relative_url }}" class="btn btn-sm btn-outline-primary">Read More</a>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>
</section>
