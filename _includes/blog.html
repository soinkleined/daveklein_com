<section id="blog">
    <div class="container">
        <div class="row">
            <div class="col-lg-12 text-center">
                <h2 class="section-heading">Latest Blog Posts</h2>
                <hr class="primary">
            </div>
        </div>
        <div class="row">
            {% for post in site.posts %}
            <div class="col-lg-4 col-sm-6 mb-4">
                <a href="{{ post.url | relative_url }}" class="portfolio-box">
                    <img src="{{ post.image | default: '/img/portfolio/1.jpg' | relative_url }}" class="img-fluid" alt="{{ post.title }}">
                    <div class="portfolio-box-caption">
                        <div class="portfolio-box-caption-content">
                            <div class="project-category text-faded">
                                {{ post.date | date: "%B %d, %Y" }}
                                {% if post.categories %}
                                  &bull; {% for category in post.categories %}
                                    <a href="{{ '/categories/' | append: category | slugify | relative_url }}" class="text-white">{{ category }}</a>{% unless forloop.last %}, {% endunless %}
                                  {% endfor %}
                                {% endif %}
                            </div>
                            <div class="project-name">
                                {{ post.title }}
                            </div>
                        </div>
                    </div>
                </a>
            </div>
            {% endfor %}
        </div>
    </div>
</section>
